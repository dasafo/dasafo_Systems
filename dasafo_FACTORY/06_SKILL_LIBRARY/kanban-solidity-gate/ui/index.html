<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dasafo_FACTORY | Vibe Kanban</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { border: "hsl(var(--border))", background: "#09090b", card: "#18181b" } } } }
    </script>
    <style>
        body {
            background-color: #09090b;
            color: #f4f4f5;
            font-family: ui-sans-serif, system-ui, sans-serif;
        }

        .kanban-col {
            min-height: 500px;
        }

        .glass-panel {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid #27272a;
        }
    </style>
</head>

<body class="p-6">
    <div class="max-w-7xl mx-auto">
        <header class="glass-panel p-6 rounded-lg mb-8 flex justify-between items-center shadow-xl">
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-white flex items-center gap-3">
                    <span class="w-3 h-3 rounded-full bg-green-500 animate-pulse"></span>
                    Vibe Kanban <span class="text-gray-500 text-sm font-normal">| dasafo_FACTORY v4.0-S</span>
                </h1>
                <p class="text-sm text-gray-400 mt-1" id="project-objective">Loading DAST state...</p>
            </div>
            <div class="text-right">
                <div class="text-xs text-gray-500 uppercase tracking-wider font-semibold">Phase / Status</div>
                <div class="text-xl font-bold text-blue-400" id="project-phase">--</div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass-panel rounded-lg p-4 kanban-col">
                <div class="flex items-center justify-between mb-4 pb-2 border-b border-gray-800">
                    <h2 class="text-sm font-semibold uppercase tracking-wider text-gray-400">01 PENDING</h2>
                    <span class="bg-gray-800 text-xs py-1 px-2 rounded-full" id="count-pending">0</span>
                </div>
                <div id="col-pending" class="space-y-3"></div>
            </div>

            <div class="glass-panel rounded-lg p-4 kanban-col">
                <div class="flex items-center justify-between mb-4 pb-2 border-b border-gray-800">
                    <h2 class="text-sm font-semibold uppercase tracking-wider text-blue-400">02 IN PROGRESS</h2>
                    <span class="bg-blue-900/30 text-blue-400 text-xs py-1 px-2 rounded-full"
                        id="count-inprogress">0</span>
                </div>
                <div id="col-inprogress" class="space-y-3"></div>
            </div>

            <div class="glass-panel rounded-lg p-4 kanban-col opacity-80">
                <div class="flex items-center justify-between mb-4 pb-2 border-b border-gray-800">
                    <h2 class="text-sm font-semibold uppercase tracking-wider text-green-400">03 COMPLETED</h2>
                    <span class="bg-green-900/30 text-green-400 text-xs py-1 px-2 rounded-full"
                        id="count-completed">0</span>
                </div>
                <div id="col-completed" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        function createTaskCard(task) {
            const phaseColor = task.phase === 'M1' ? 'text-purple-400' : task.phase === 'M2' ? 'text-blue-400' : task.phase === 'M3' ? 'text-orange-400' : task.phase === 'M4' ? 'text-red-400' : 'text-cyan-400';
            const agent = task.agent || task.assigned_to || 'UNASSIGNED';

            return `
                <div class="bg-[#18181b] border border-gray-800 p-4 rounded-md shadow-sm hover:border-gray-600 transition-colors">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-xs font-mono bg-gray-800 px-2 py-1 rounded text-gray-300">${task.id}</span>
                        <span class="text-xs font-bold ${phaseColor}">${task.phase || 'N/A'}</span>
                    </div>
                    <h3 class="text-sm font-medium text-gray-200 mb-3">${task.title || 'Untitled Task'}</h3>
                    <div class="flex justify-between items-center text-xs">
                        <span class="text-gray-500 flex items-center gap-1">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                            ${agent}
                        </span>
                    </div>
                </div>
            `;
        }

        async function fetchDashboardData() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();

                // Update Header
                if (data.state) {
                    document.getElementById('project-objective').innerText = data.state.objective || 'No objective defined.';
                    document.getElementById('project-phase').innerText = `${data.state.current_phase || '??'} | ${data.state.project_status || 'UNKNOWN'}`;
                }

                // Render Kanban
                const columns = { 'PENDING': '', 'IN_PROGRESS': '', 'COMPLETED': '' };
                let counts = { 'PENDING': 0, 'IN_PROGRESS': 0, 'COMPLETED': 0 };

                if (data.registry && Array.isArray(data.registry)) {
                    data.registry.forEach(task => {
                        // Normalizar el estado a nuestras 3 columnas físicas
                        const status = task.status === 'COMPLETED' ? 'COMPLETED' :
                            (task.status === 'IN_PROGRESS' ? 'IN_PROGRESS' : 'PENDING');
                        columns[status] += createTaskCard(task);
                        counts[status]++;
                    });
                }

                document.getElementById('col-pending').innerHTML = columns['PENDING'] || '<p class="text-xs text-gray-600 italic">No tasks pending.</p>';
                document.getElementById('col-inprogress').innerHTML = columns['IN_PROGRESS'] || '<p class="text-xs text-gray-600 italic">No tasks in progress.</p>';
                document.getElementById('col-completed').innerHTML = columns['COMPLETED'] || '<p class="text-xs text-gray-600 italic">No tasks completed.</p>';

                document.getElementById('count-pending').innerText = counts['PENDING'];
                document.getElementById('count-inprogress').innerText = counts['IN_PROGRESS'];
                document.getElementById('count-completed').innerText = counts['COMPLETED'];

            } catch (err) {
                console.error("Error fetching data:", err);
                document.getElementById('project-objective').innerText = "🔴 Connection error to DAST Server.";
            }
        }

        // Auto-refresh every 5 seconds
        fetchDashboardData();
        setInterval(fetchDashboardData, 5000);
    </script>
</body>

</html>
