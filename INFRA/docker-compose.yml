# dasafo_FACTORY | INFRA Node v3.2.0-S "Modular Toolbox"
# Objective: Shared, isolated, and high-performance industrial infrastructure.

services:
  # 🧠 Central Knowledge Graph
  kg-db:
    image: neo4j:latest
    container_name: dasafo-shared-kg
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD}
    volumes:
      - shared_kg_data:/data
    networks:
      - dasafo_network
    deploy:
      resources:
        limits:
          memory: 4G # Anti-Noisy-Neighbor armor
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 🐘 Central Operational DB
  shared-db:
    image: postgres:15-alpine
    container_name: dasafo-shared-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
    volumes:
      - shared_db_data:/var/lib/postgresql/data
    networks:
      - dasafo_network
    deploy:
      resources:
        limits:
          memory: 2G # Industrial scale quota
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 📊 Observability Node
  health-monitor:
    image: nicolargo/glances:latest
    container_name: dasafo-health-monitor
    ports:
      - "61208:61208"
    environment:
      - GLANCES_OPT=-w
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - dasafo_network
    deploy:
      resources:
        limits:
          memory: 512M # Monitoring quota

networks:
  dasafo_network:
    name: dasafo_network
    driver: bridge

volumes:
  shared_kg_data:
  shared_db_data:
