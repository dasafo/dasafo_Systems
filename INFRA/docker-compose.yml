# dasafo_FACTORY | INFRA Node v3.1 "Infraestructura Blindada"
# Objective: Shared, isolated, and high-performance industrial infrastructure.

services:
  # 🧠 Central Knowledge Graph
  kg-db:
    image: neo4j:latest
    container_name: dasafo-shared-kg
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/dasafo_factory_secret
    volumes:
      - shared_kg_data:/data
    networks:
      - dasafo_network
    deploy:
      resources:
        limits:
          memory: 4G # Anti-Noisy-Neighbor armor

  # 🐘 Central Operational DB
  shared-db:
    image: postgres:15-alpine
    container_name: dasafo-shared-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=dasafo_factory_secret
    volumes:
      - shared_db_data:/var/lib/postgresql/data
    networks:
      - dasafo_network
    deploy:
      resources:
        limits:
          memory: 2G # Industrial scale quota

  # 📊 Observability Node
  health-monitor:
    image: nicolargo/glances:latest
    container_name: dasafo-health-monitor
    ports:
      - "61208:61208"
    environment:
      - GLANCES_OPT=-w
    networks:
      - dasafo_network
    deploy:
      resources:
        limits:
          memory: 512M # Monitoring quota

networks:
  dasafo_network:
    name: dasafo_network
    driver: bridge

volumes:
  shared_kg_data:
  shared_db_data:
