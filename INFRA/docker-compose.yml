# ⚙️ dasafo_FACTORY | INFRA Node v4.0-S "Industrial Core"
# 🎯 Objective: Shared, high-performance, and autoshielded industrial infrastructure.

services:
  # 🧠 Central Knowledge Graph (Neo4j)
  kg-db:
    image: neo4j:latest
    container_name: dasafo-shared-kg
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD}
    volumes:
      - shared_kg_data:/data
    networks:
      - dasafo_network
    deploy:
      resources:
        limits:
          memory: 4G # Graph traversal armor
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474/" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # 🐘 Central Operational DB (Postgres)
  shared-db:
    image: postgres:15-alpine
    container_name: dasafo-shared-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
    volumes:
      - shared_db_data:/var/lib/postgresql/data
    networks:
      - dasafo_network
    deploy:
      resources:
        limits:
          memory: 2G # Relational quota
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ⚡ Fast Orchestration Cache (Redis)
  cache-node:
    image: redis:alpine
    container_name: dasafo-cache-node
    ports:
      - "6379:6379"
    networks:
      - dasafo_network
    deploy:
      resources:
        limits:
          memory: 1G

  # 📊 Observability Node (Glances)
  health-monitor:
    image: nicolargo/glances:latest
    container_name: dasafo-health-monitor
    ports:
      - "61208:61208"
    environment:
      - GLANCES_OPT=-w
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - dasafo_network
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  dasafo_network:
    name: dasafo_network
    driver: bridge

volumes:
  # Internal named volumes preserved for data persistence
  shared_kg_data:
  shared_db_data:
